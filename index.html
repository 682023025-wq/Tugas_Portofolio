<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portofolio - Raihan Agil Maulana</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="Frontend/profil/css/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav id="navbar">
      <a href="Frontend/admin/login.html" class="logo">Agil.</a>
      <ul id="navMenu">
        <li><a href="#home" class="nav-link active">Home</a></li>
        <li><a href="#about" class="nav-link">About</a></li>
        <li><a href="#skills" class="nav-link">Skills</a></li>
        <li><a href="#experience" class="nav-link">Experience</a></li>
        <li><a href="#projects" class="nav-link">Projects</a></li>
        <li><a href="#contact" class="nav-link">Contact</a></li>
      </ul>
      <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
    </nav>

    <!-- Hero Section (Dinamis) -->
    <section class="hero" id="home">
      <div class="hero-content" id="hero-content">
        <!-- Konten akan diisi oleh JS -->
        <div class="loading-skeleton">Memuat profil...</div>
      </div>
    </section>

    <!-- About Section (Dinamis) -->
    <section id="about">
      <h2 class="section-title">Tentang Saya</h2>
      <div class="about-content">
        <div class="about-img">
          <img id="profile-photo" src="" alt="Foto Profil" style="display:none; width:100%; border-radius:50%;" />
          <div class="placeholder-img" id="photo-placeholder"><i class="fas fa-user"></i></div>
        </div>
        <div class="about-text" id="about-text">
          <!-- Diisi oleh JS -->
        </div>
      </div>
    </section>

    <!-- Skills Section (Dinamis) -->
    <section id="skills" class="bg-white">
      <h2 class="section-title">Keahlian</h2>
      <div class="skills-grid" id="skills-container">
        <!-- Diisi oleh JS -->
      </div>
    </section>

    <!-- Experience Section (Dinamis) -->
    <section id="experience">
      <h2 class="section-title">Pengalaman</h2>
      <div class="timeline" id="experience-container">
        <!-- Diisi oleh JS -->
      </div>
    </section>

    <!-- Projects Section (Dinamis) -->
    <section id="projects" class="bg-white">
      <h2 class="section-title">Proyek Saya</h2>
      <div class="projects-grid" id="projects-container">
        <!-- Diisi oleh JS -->
      </div>
    </section>

    <!-- Contact & Footer tetap statis atau bisa dibuat dinamis nanti -->
    <section id="contact">
      <h2 class="section-title">Hubungi Saya</h2>
      <div class="contact-container">
        <p id="contact-email-display">Email akan dimuat dari database...</p>
        <form class="contact-form">
          <input type="text" placeholder="Nama Anda" required />
          <input type="email" placeholder="Email Anda" required />
          <textarea placeholder="Pesan Anda" required></textarea>
          <button type="submit" class="btn">Kirim Pesan</button>
        </form>
      </div>
    </section>

    <footer>
      <div class="socials">
        <a href="#"><i class="fab fa-github"></i></a>
        <a href="#"><i class="fab fa-linkedin"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
      </div>
      <p>&copy; <span id="current-year"></span> Raihan Agil Maulana. All Rights Reserved.</p>
    </footer>

    <!-- JavaScript Utama -->
    <script src="Frontend/profil/js/script.js"></script>
  </body>
</html>
