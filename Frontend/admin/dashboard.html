<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Admin - Portofolio Agil</title>
    
    <!-- Base Dashboard CSS (Sidebar & Layout) -->
    <link rel="stylesheet" href="css/dashboard.css" />
    
    <!-- Dynamic Menu CSS (Akan di-load via JS atau manual per halaman) -->
    <link id="menu-css" rel="stylesheet" href="" />
</head>
<body>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-header">
                <h3>Agil Admin</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-menu="overview">

                    Overview
                </a>
                <a href="#" class="nav-item" data-menu="projects">
                    <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2zm2-1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H4z"/></svg>
                    Kelola Proyek
                </a>
                <a href="#" class="nav-item" data-menu="skills">
                    <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M9.405 1.05a.5.5 0 0 1 .18.68l-4 14a.5.5 0 0 1-.96-.27l4-14a.5.5 0 0 1 .78-.41z"/><path d="M4.5 1a.5.5 0 0 1 .5.5v14a.5.5 0 0 1-1 0v-14a.5.5 0 0 1 .5-.5z"/><path d="M12 1a.5.5 0 0 1 .5.5v14a.5.5 0 0 1-1 0v-14a.5.5 0 0 1 .5-.5z"/></svg>
                    Kelola Skill
                </a>
                <a href="#" class="nav-item" data-menu="experience">
                    <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM5 8h6v5H5V8z"/></svg>
                    Kelola Pengalaman
                </a>
                <a href="../../index.html" class="nav-item logout-btn">
                    <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/><path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/></svg>
                    Kembali ke Website
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <header class="dashboard-header">
                <h2 id="page-title">Overview</h2>
                <div class="user-profile"><span>Admin</span></div>
            </header>

            <!-- Konten Dinamis -->
            <div class="content-area" id="content-area">
                <!-- Default Overview Content -->
                <div class="welcome-card">
                    <h3>Selamat Datang, Agil!</h3>
                    <p>Pilih menu di sidebar untuk mulai mengelola data portofolio.</p>
                    <div class="stats-grid">
                        <div class="stat-box"><h4>Total Proyek</h4><span class="stat-number">3</span></div>
                        <div class="stat-box"><h4>Total Skill</h4><span class="stat-number">6</span></div>
                        <div class="stat-box"><h4>Pengalaman</h4><span class="stat-number">4</span></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Base Navigation JS -->
    <script src="js/dashboard.js"></script>
    <!-- Dynamic Menu JS (Akan di-load via dashboard-nav.js) -->
    <script id="menu-js" src=""></script>
</body>
</html>
